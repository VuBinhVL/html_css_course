<style>
  .button {
    background-color: green;
    color: white;
    border: none;
    padding-top: 6px;
    padding-bottom: 6px;
    padding-right: 9px;
    padding-left: 9px;
    cursor: pointer;
    margin-left: 10px;
    margin-right: 10px;
    transition:
      padding-left 0.15s,
      padding-right 0.15s,
      margin-left 0.15s,
      margin-right 0.15s;
  }

  .button:hover {
    padding-left: 15px;
    padding-right: 15px;
    margin-left: 0px;
    margin-right: 0px;
  }
</style>
<button class="button">One</button>
<button class="button">Two</button>
<button class="button">Three</button>
