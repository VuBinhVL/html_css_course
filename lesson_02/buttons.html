<style>
  .subscribe-button {
    background-color: red;
    color: white;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    margin-right: 5px;
    transition: opacity 0.15s;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
  }

  .subscribe-button:hover {
    opacity: 0.8;
  }

  .subscribe-button:active {
    opacity: 0.5;
  }

  .join-button {
    background-color: white;
    border-color: rgba(44, 118, 211);
    border-style: solid;
    border-width: 1px;
    cursor: pointer;
    color: rgba(44, 118, 211);
    border-radius: 2px;
    padding-top: 9px;
    padding-bottom: 9px;
    padding-left: 16px;
    padding-right: 16px;
    vertical-align: top;
    transition:
      background-color 0.15s,
      color 0.15s;
  }

  .join-button:hover {
    background-color: rgba(44, 118, 211);
    color: white;
  }

  .join-button:active {
    opacity: 0.5;
  }

  .tweet-button {
    background-color: rgba(44, 118, 211);
    color: white;
    border-radius: 18px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    margin-left: 5px;
    transition: box-shadow 0.15s;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 16px;
    padding-right: 16px;
    vertical-align: top;
  }

  .tweet-button:hover {
    box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15);
  }
</style>
<button class="subscribe-button">SUBSCRIBE</button>
<button class="join-button">JOIN</button>
<button class="tweet-button">Tweet</button>
