<!-- Linked Buttons -->
<style>
  .apply-button {
    background-color: rgb(10, 102, 194);
    border: none;
    height: 34px;
    width: 200px;
    border-radius: 17px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-right: 8px;
    transition: background-color 0.15s;
  }

  .apply-button:hover {
    background-color: rgb(2, 70, 138);
  }

  .save-button {
    background-color: white;
    color: rgb(10, 102, 194);
    height: 34px;
    width: 70px;
    border-radius: 17px;
    border-style: solid;
    border-width: 1px;
    border-color: rgb(10, 102, 194);
    font-weight: bold;
    cursor: pointer;
    transition:
      background-color 0.15s,
      border-width 0.15s;
  }

  .save-button:hover {
    background-color: rgb(226, 240, 254);
    border-width: 2px;
  }
</style>

<button class="apply-button">Apply on company website</button>
<button class="save-button">Save</button>
